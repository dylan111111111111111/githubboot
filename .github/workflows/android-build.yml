name: Build APK

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  - run: gradle -p ABootpatch :app:assembleDebug

  - uses: actions/upload-artifact@v4
    with:
      name: apk
      path: ABootpatch/app/build/outputs/apk/debug/*.apk
```
