name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Ver estructura (debug)
        run: ls -R

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Dar permisos a gradlew
        run: chmod +x gradlew
        working-directory: ABootpatch

      - name: Crear gradle.properties limpio
        run: |
          rm -f gradle.properties
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
        working-directory: ABootpatch

      - name: Forzar Gradle 8.4
        run: |
          sed -i 's|gradle-.*-bin.zip|gradle-8.4-bin.zip|' gradle/wrapper/gradle-wrapper.properties
        working-directory: ABootpatch

      - name: Compilar APK
        run: ./gradlew assembleDebug
        working-directory: ABootpatch

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ABootpatch/app/build/outputs/apk/debug/app-debug.apk
