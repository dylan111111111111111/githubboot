name: Build APK + Flashable ZIP

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Instalar Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Permisos gradlew
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Build Flashable ZIP
        run: ./build_module.ps1
        shell: pwsh

      - name: Subir Flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: flashable-zip
          path: flashable/output.zip
