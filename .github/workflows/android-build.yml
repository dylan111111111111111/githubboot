name: Build APK from ZIP

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v3

      - name: Instalar unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Descomprimir proyecto
        run: unzip proyecto.zip -d proyecto

      - name: Ver contenido (debug)
        run: ls proyecto

      - name: Dar permisos a gradlew
        run: chmod +x proyecto/gradlew

      - name: Compilar APK
        run: cd proyecto && ./gradlew assembleRelease

      - name: Subir APK
        uses: actions/upload-artifact@v3
        with:
          name: apk-release
          path: proyecto/app/build/outputs/apk/release/app-release.apk
