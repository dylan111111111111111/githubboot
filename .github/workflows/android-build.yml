name: Build APK + Flashable ZIP

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ Clonar repo
      - uses: actions/checkout@v3

      # 2️⃣ Descomprimir ZIP si subes como zip (opcional)
      #- name: Descomprimir proyecto
      #  run: Expand-Archive proyecto.zip -DestinationPath proyecto

      # 3️⃣ Instalar JDK (para compilar APK)
      - name: Instalar Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 4️⃣ Dar permisos a gradlew
      - name: Permisos gradlew
        run: chmod +x ./gradlew

      # 5️⃣ Compilar APK
      - name: Build APK
        run: ./gradlew assembleRelease

      # 6️⃣ Subir APK
      - name: Subir APK
        uses: actions/upload-artifact@v3
        with:
          name: apk-release
          path: app/build/outputs/apk/release/app-release.apk

      # 7️⃣ Ejecutar script para generar zip flashable
      - name: Build Flashable ZIP
        run: ./build_module.ps1
        shell: pwsh

      # 8️⃣ Subir zip flashable
      - name: Subir Flashable ZIP
        uses: actions/upload-artifact@v3
        with:
          name: flashable-zip
          path: flashable/output.zip   # ajusta según tu script
