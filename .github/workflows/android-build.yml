name: Build Flashable ZIP

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ Clonar tu repo
      - uses: actions/checkout@v3

      # 2️⃣ Ejecutar tu script PowerShell que genera el ZIP
      - name: Build Flashable ZIP
        run: ./build_module.ps1
        shell: pwsh

      # 3️⃣ Subir ZIP generado como artifact
      - name: Subir Flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: flashable-zip
          path: flashable/output.zip   # Cambia esta ruta si tu PS1 genera el ZIP en otro lugar
